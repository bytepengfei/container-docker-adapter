version: 2

project_name: container-docker-adapter

builds:
  - id: container-docker-adapter
    main: ./cmd/dockerd-compat
    binary: container-docker-adapter
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - >-
        -s -w
        -X main.version={{.Version}}
        -X main.commit={{.Commit}}
        -X main.buildTime={{.Date}}

archives:
  - ids:
      - container-docker-adapter
    formats:
      - tar.gz
    name_template: "{{.ProjectName}}-{{.Version}}-darwin-arm64"

source:
  enabled: true
  name_template: "{{.ProjectName}}-{{.Version}}-source"
  format: tar.gz
  prefix_template: "{{.ProjectName}}-{{.Version}}/"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
